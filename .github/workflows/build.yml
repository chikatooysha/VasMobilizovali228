name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev libgmp3-dev dpkg-dev execstack lld
          sudo apt-get install -y libcc1-0 autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libncursesw5-dev libsqlite3-dev tk-dev p7zip-full unzip zip git
          pip install --upgrade pip setuptools virtualenv buildozer Cython

      - name: Build APK with Buildozer
        run: |
          # Создаем пустые конфиги, чтобы система не ругалась на отсутствие папок
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Запускаем чистую сборку через сам buildozer
          buildozer android debug
        env:
          ACCEPT_ANDROID_SDK_LICENSES: "y"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: bin/*.apk
          
